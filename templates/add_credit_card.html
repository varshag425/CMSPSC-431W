<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Credit Card — NittanyAuction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { background: #eef4fb; font-family: 'Playfair Display', sans-serif; }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
        }

        .top-nav .brand span { color: #cce4ff; }

        .top-nav a.signout {
            color: #cce4ff;
            font-size: .85rem;
            text-decoration: none;
        }

        .top-nav a.signout:hover { color: #fff; }

        .container-box {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 0;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            transition: background .2s;
            margin-top: 20px;
        }

        .btn-blue:hover {
            background: #155a9e;
            color: #fff;
        }

        .form-label {
            color: #1a3a5c;
            font-size: 1rem;
            margin-top: 10px;
            font-weight: 600;
        }

        .error-text {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
    <a href="/" class="signout">Sign Out</a>
</div>

<div class="container-box">
    <h1 class="mb-4">Add a New Credit Card</h1>
    <p>Format: <strong>****-****-****-****</strong> or <strong>****-******-*****</strong>. Hyphens are required.</p>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Credit Card Number</label>
            <input type="text" class="form-control" name="new_credit_card_number" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Credit Card Type</label>
            <input type="text" class="form-control" name="new_credit_card_type" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Expiration Month</label>
            <input type="number" class="form-control" name="new_expire_month" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Expiration Year</label>
            <input type="number" class="form-control" name="new_expire_year" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Security Code</label>
            <input type="number" class="form-control" name="new_security_code" required>
        </div>

        <button class="btn-blue" type="submit" name="submit_new_credit_card" value="submit_new_credit_card">
            Submit
        </button>
    </form>

    <form action="/view_credit_cards.html" method="GET">
        <button class="btn-blue" type="submit" name="go_back" value="go_back">
            Go Back
        </button>
    </form>

    {% if error %}
        <p class="error-text">{{ error }}</p>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
