<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
        body { background: #eef4fb; font-family: 'Playfair Display', sans-serif; }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-nav .brand { class=color: #fff; font-size: 1.4rem; font-weight: 600; text-decoration: none; }
        .top-nav .brand span { class=color: #cce4ff; }
        .top-nav a.signout { class=color: #cce4ff; font-size: .85rem; text-decoration: none; }
        .top-nav a.signout:hover { class=color: #fff; }

        .btn{
            background: #1a6fc4;
            border: none;
            class=color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 0;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            transition: background .2s;
            margin-top: 20px;
            margin-bottom:20px;
            max-width:150px;
        }
        .btn:hover { background: #155a9e; class=color: #fff; }
        .label{
            class=color:#1a3a5c;
            font-size: 1.2rem;
            margin-top:10px;
        }
</style>
</head>
<body>
<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
    <a href="/" class="signout">Sign Out</a>
</div>
<h1> Add a New Credit Card </h1><div class="row">
<div class="col-3"><label class="label">Credit Card Number</label> <p>(Format is ****-****-****-**** or ****-******-*****). Must include hyphens:</p>
    <form method="POST"></form>
    <div class="col-9"><input type="text" name="new_credit_card_number" required></div>
    <div class="col-3"><label class="label"> Credit Card Type:</label></div>
    <div class="col-9"><input type="text" name="new_credit_card_type" required></div>
    <div class="col-3"><label class="label"> Expiration Month:</label></div>
    <div class="col-9"><input type="number" name="new_expire_month" required></div>
    <div class="col-3"><label class="label"> Expiration Year:</label></div>
    <div class="col-9"><input type="number" name="new_expire_year" required></div>
    <div class="col-3"><label class="label"> Security Code: </label></div>
    <div class="col-9"><input type="number" name="new_security_code" required></div>
    <button class="btn" type="submit" name="submit_new_credit_card" value="submit_new_credit_card"> Submit</button>
</form>
<form action="/view_credit_cards.html" method="GET">
    <button class="btn" type="submit" name="go_back" value="go_back"> Go Back</button>
</form>
{% if error %}<p class="style=color:red;">{{ error }}</p>{% endif %}
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
