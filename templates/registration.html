<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — NittanyAuction</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            font-family: 'Playfair Display', serif;
            background: #eef4fb;
        }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-nav .brand { color: #fff; font-size: 1.4rem; font-weight: 700; text-decoration: none; }
        .top-nav .brand span { color: #cce4ff; }

        .register-card {
            background: #fff;
            border-radius: 10px;
            border-top: 4px solid #1a6fc4;
            box-shadow: 0 4px 20px rgba(26,111,196,.12);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }

        .register-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3a5c;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        label {
            font-size: .85rem;
            color: #5a8ab5;
            font-weight: 600;
            letter-spacing: .04em;
            margin-bottom: .3rem;
            display: block;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: .6rem .85rem;
            border: 1.5px solid #c5dcf5;
            border-radius: 6px;
            font-family: 'Playfair Display', serif;
            font-size: .9rem;
            margin-bottom: 1.1rem;
            background: #f5f9ff;
            transition: border-color .2s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #1a6fc4;
            background: #fff;
        }

        /* ROLE RADIO BUTTONS */
        .role-label {
            font-size: .75rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #5a8ab5;
            margin-bottom: .75rem;
            font-weight: 600;
        }
        .role-options {
            display: flex;
            gap: .75rem;
            margin-bottom: 1.2rem;
        }
        .role-option {
            flex: 1;
            text-align: center;
        }
        .role-option input[type="radio"] { display: none; }
        .role-option label {
            display: block;
            padding: .55rem 0;
            border: 1.5px solid #c5dcf5;
            border-radius: 6px;
            color: #5a8ab5;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s;
            letter-spacing: 0;
            font-weight: 500;
            background: #f5f9ff;
            margin: 0;
        }
        .role-option input[type="radio"]:checked + label {
            background: #1a6fc4;
            border-color: #1a6fc4;
            color: #fff;
            font-weight: 600;
        }
        .role-option label:hover {
            border-color: #1a6fc4;
            color: #1a6fc4;
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: .88rem;
            padding: .6rem 0;
            border-radius: 6px;
            width: 100%;
            display: block;
            text-align: center;
            transition: background .2s;
            cursor: pointer;
            margin-bottom: .5rem;
        }
        .btn-blue:hover { background: #155a9e; }

        .btn-outline-blue {
            background: transparent;
            border: 1.5px solid #1a6fc4;
            color: #1a6fc4;
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            font-size: .88rem;
            padding: .6rem 0;
            border-radius: 6px;
            width: 100%;
            display: block;
            text-align: center;
            transition: background .2s;
            cursor: pointer;
            margin-bottom: .5rem;
        }
        .btn-outline-blue:hover { background: #1a6fc4; color: #fff; }

        .divider {
            border: none;
            border-top: 1px solid #dbeeff;
            margin: 1.2rem 0;
        }

        .error-msg {
            color: #c62828;
            font-size: .82rem;
            background: #fce4ec;
            border-radius: 6px;
            padding: .5rem .75rem;
            margin-top: .75rem;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- NAV -->
<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
</div>

<!-- REGISTER FORM -->
<div class="d-flex justify-content-center align-items-center py-5">
    <div class="register-card">
        <h1>Create Account</h1>

        <form method="POST">
            <div class="role-label">Select Your Role</div>
            <div class="role-options">
                <div class="role-option">
                    <input type="radio" name="role" id="buyer" value="buyer" checked>
                    <label for="buyer">Buyer</label>
                </div>
                <div class="role-option">
                    <input type="radio" name="role" id="seller" value="seller">
                    <label for="seller">Seller</label>
                </div>
                <div class="role-option">
                    <input type="radio" name="role" id="helpdesk" value="helpdesk">
                    <label for="helpdesk">Helpdesk</label>
                </div>
            </div>

            <label>Email Address</label>
            <input type="text" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn-blue">Register</button>
        </form>

        <hr class="divider">

        <form action="/" method="GET">
            <button type="submit" class="btn-outline-blue">Go Back</button>
        </form>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
