<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2> Select Your user Role </h2>
<form method="POST">
    <label>
        <input type="radio" name="role" value="buyer" checked> Buyer
    </label>

    <label>
        <input type="radio" name="role" value="seller"> Seller
    </label>

    <label>
        <input type="radio" name="role" value="helpdesk"> Helpdesk
    </label>
    <br>
    <h2> User Email address </h2>
    <input type="text" name="email" required>
    <br>
    <h2> Password </h2>
    <input type="password" name="password" required>
    <button type="submit"> Register </button>
</form>
<br>
<form action="/" method="GET">
    <button type="submit" name="go_back" value="go_back"> Go Back</button>
</form>
{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
</body>
</html>
