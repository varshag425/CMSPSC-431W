<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seller Registration — NittanyAuction</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef4fb;
            font-family: 'Playfair Display', sans-serif;
        }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
        }

        .top-nav .brand span {
            color: #cce4ff;
        }

        .top-nav a.signout {
            color: #cce4ff;
            font-size: .85rem;
            text-decoration: none;
        }

        .top-nav a.signout:hover {
            color: #fff;
        }

        .welcome-bar {
            background: #2980d9;
            color: #fff;
            padding: .65rem 1.5rem;
            font-size: .92rem;
        }

        .welcome-bar strong {
            color: #d6ecff;
        }

        .section-title {
            font-size: .75rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #5a8ab5;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .card-box {
            background: #ffffff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            max-width: 700px;
            margin: 0 auto;
        }

        .page-heading {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a4f84;
            margin-bottom: 1.5rem;
        }

        .form-check {
            background: #f8fbff;
            border: 1px solid #d9e8f7;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .form-check-label {
            font-size: 1rem;
            color: #1f3f60;
            margin-left: .4rem;
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            transition: background .2s;
        }

        .btn-blue:hover {
            background: #155a9e;
            color: #fff;
        }

        .btn-outline-blue {
            background: #fff;
            border: 1px solid #1a6fc4;
            color: #1a6fc4;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-outline-blue:hover {
            background: #eaf3fc;
            color: #155a9e;
            border-color: #155a9e;
        }

        .error-text {
            color: #c0392b;
            margin-top: 1rem;
            font-size: .95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <div class="top-nav">
        <a class="brand" href="/">Nittany<span>Auction</span></a>
        <a href="/" class="signout">Sign Out</a>
    </div>

    <!-- WELCOME BAR -->
    <div class="welcome-bar">
        Seller Registration
    </div>

    <!-- PAGE CONTENT -->
    <div class="container py-4">
        <p class="section-title">Register Account</p>

        <div class="card-box">
            <h1 class="page-heading">Select which type of seller to register this account with</h1>

            <form method="POST">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seller_role" id="seller" value="seller" checked>
                    <label class="form-check-label" for="seller">
                        Seller
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seller_role" id="local_vendor" value="local_vendor">
                    <label class="form-check-label" for="local_vendor">
                        Local Vendor
                    </label>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn-blue">Register</button>
                </div>
            </form>

            <form action="/registration.html" method="GET" class="mt-3">
                <button type="submit" name="go_back" value="go_back" class="btn-outline-blue">
                    Go Back
                </button>
            </form>

            {% if error %}
                <p class="error-text">{{ error }}</p>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
