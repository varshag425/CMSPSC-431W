<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Main Page</title>
    <style>
        body{
            min-height: 100vh;
            justify-content: center;
            display:flex;
            align-items:center;
            flex-direction:column;
        }
        .title{
            font-size: 75px;
        }
        .btn{
             background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 35px;
            padding: .75rem 0;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            transition: background .2s;
            margin-top: 10px;
            margin-bottom: 20px;
            min-width: 200px;
            min-height:80px;
        }
        .btn:hover { background: #155a9e; color: #fff; }
        }
    </style>
</head>
<body>
<h2>Welcome to</h2>
<h1 class="title">Nittany Auction</h1>
<p>Please login if you already have an account or register a new account if you do not already have one.</p>
<form action="/login.html" method="GET">
    <button class="btn" type="submit">Log In</button>
</form>

<form action="/registration.html" method="GET">
    <button class="btn" type="submit"> Register </button>
</form>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
