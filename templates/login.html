<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Login Page</title>
        <style>
        body{
            min-height: 100vh;
            font-family: Arial;
            background: linear-gradient(lightblue,white);
        }
        .nav{
            background-color: white;
            padding: 15px 30px;
        }
        .login-box{
            border-color: white;
            border-width: 5px;
        }
        </style>
</head>

<body>
<ul class="nav nav-underline">
    <li class="nav-item">
        <a class="nav-link" href="/">NittanyAuction</a>
    </li>
    <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/login.html">Login</a>
    </li>
</ul>
<div class="login-box">
<h1>LOGIN</h1>
<form method="POST">
    <label>Email:</label><br>
    <input type="text" name="email" required><br>
    <label>Password:</label><br>
    <input type="password" name="password" required><br>
    <button type="submit" name="role" value="bidder">Bidder Login</button>
    <button type="submit" name="role" value="seller">Seller Login</button>
    <button type="submit" name="role" value="helpdesk">HelpDesk Login</button>
    <br>
</form>

<form action="/change_password.html" method="GET">
    <button type="submit" name="change password" value="change password"> Change Password</button>
</form>
<br>
<form action="/" method="GET">
    <button type="submit" name="go_back" value="go_back"> Go Back</button>
</form>
{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</div>
</body>
</html>
