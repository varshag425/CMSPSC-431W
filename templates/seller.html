<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seller Dashboard — NittanyAuction</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef4fb; font-family: 'Playfair Display', sans-serif; }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
        }

        .top-nav .brand span { color: #cce4ff; }

        .top-nav a.signout {
            color: #cce4ff;
            font-size: .85rem;
            text-decoration: none;
        }

        .top-nav a.signout:hover { color: #fff; }

        .welcome-bar {
            background: #2980d9;
            color: #fff;
            padding: .65rem 1.5rem;
            font-size: .92rem;
        }

        .welcome-bar strong { color: #d6ecff; }

        .section-title {
            font-size: .75rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #5a8ab5;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 0;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            transition: background .2s;
        }

        .btn-blue:hover {
            background: #155a9e;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
    <a href="/" class="signout">Sign Out</a>
</div>

<div class="welcome-bar">
    Welcome back, <strong>{{ email }}</strong>
</div>

<div class="container py-4">
    <p class="section-title">Seller Dashboard</p>

    <div class="row g-3">
        <div class="col-md-4">
            <a href="/seller_listings.html" class="btn-blue">Manage Listings</a>
        </div>
        <div class="col-md-4">
            <a href="/seller_settings.html" class="btn-blue">Account Settings</a>
        </div>

        {% if role == 'local_vendor' %}
        <div class="col-md-4">
            <a href="/local_vendor_settings.html" class="btn-blue">Vendor Settings</a>
        </div>
        {% endif %}

        <div class="col-md-4">
            <a href="/product_listings.html" class="btn-blue">Browse Listings</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
