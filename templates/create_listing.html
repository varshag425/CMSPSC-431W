<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Create Listing</title>
</head>
<body>
<h1> Create Listing </h1>
<br>
<form method="POST">
    <h3> Auction Title </h3>
    <input type="text" name="auction_title" required>

    <h3> Product Name </h3>
    <input type="text" name="product_name" required>

    <h3> Product Description </h3>
    <textarea name="product_description" rows="4" cols="50"></textarea>

    <h3> Category </h3>
    <select name="category" required>
        <option value="">Select a Category</option>
        {% for category in categories %}
        <option value="{{ category[0] }}">{{ category[0] }}</option>
        {% endfor %}
    </select>

    <h3> Quantity </h3>
    <input type="number" name="quantity" min="1" required>

    <h3> Reserve Price </h3>
    <input type="text" name="reserve_price" required>

    <h3> Max Bids </h3>
    <input type="number" name="max_bids" min="1" required>
    <br><br>
    <button type="submit"> Publish Listing </button>
</form>
<br>
<form action="/seller_listings.html" method="GET">
    <button type="submit"> Go Back </button>
</form>
{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
