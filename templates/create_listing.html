<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Listing — NittanyAuction</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef4fb;
            font-family: 'Playfair Display', sans-serif;
        }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
        }

        .top-nav .brand span {
            color: #cce4ff;
        }

        .top-nav a.signout {
            color: #cce4ff;
            font-size: .85rem;
            text-decoration: none;
        }

        .top-nav a.signout:hover {
            color: #fff;
        }

        .welcome-bar {
            background: #2980d9;
            color: #fff;
            padding: .65rem 1.5rem;
            font-size: .92rem;
        }

        .welcome-bar strong {
            color: #d6ecff;
        }

        .section-title {
            font-size: .75rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #5a8ab5;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .page-card {
            background: #fff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(26, 111, 196, 0.08);
            padding: 2rem;
        }

        .page-heading {
            color: #1a6fc4;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 600;
            color: #2c4d6e;
            margin-bottom: .4rem;
        }

        .form-control,
        .form-select {
            border-radius: 8px;
            border: 1px solid #c9dcef;
            padding: .65rem .85rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #1a6fc4;
            box-shadow: 0 0 0 0.15rem rgba(26, 111, 196, 0.15);
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            transition: background .2s;
        }

        .btn-blue:hover {
            background: #155a9e;
            color: #fff;
        }

        .btn-outline-blue {
            background: #fff;
            border: 1px solid #1a6fc4;
            color: #1a6fc4;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-outline-blue:hover {
            background: #1a6fc4;
            color: #fff;
        }

        .error-box {
            background: #fdeaea;
            color: #b42318;
            border: 1px solid #f5c2c7;
            border-radius: 8px;
            padding: .85rem 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
    <a href="/" class="signout">Sign Out</a>
</div>

<div class="welcome-bar">
    Welcome back, <strong>{{ email }}</strong>
</div>

<div class="container py-4">
    <p class="section-title">Seller Dashboard</p>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="page-card">
                <h2 class="page-heading">Create Listing</h2>

                {% if error %}
                <div class="error-box">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="auction_title" class="form-label">Auction Title</label>
                        <input type="text" id="auction_title" name="auction_title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="product_name" class="form-label">Product Name</label>
                        <input type="text" id="product_name" name="product_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="product_description" class="form-label">Product Description</label>
                        <textarea id="product_description" name="product_description" rows="4" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="image_url" class="form-label">Product Image URL (optional)</label>
                        <input type="text" id="image_url" name="image_url" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select a Category</option>
                            {% for category in categories %}
                            <option value="{{ category[0] }}">{{ category[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" id="quantity" name="quantity" class="form-control" min="1" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="max_bids" class="form-label">Max Bids</label>
                            <input type="number" id="max_bids" name="max_bids" class="form-control" min="1" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="reserve_price" class="form-label">Reserve Price</label>
                        <input type="text" id="reserve_price" name="reserve_price" class="form-control" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-blue">Publish Listing</button>
                        <a href="/seller_listings.html" class="btn btn-outline-blue">Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
