<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Complete Payment — NittanyAuction</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef4fb; font-family: 'Playfair Display', sans-serif; }

        .top-nav {
            background: #1a6fc4;
            padding: .65rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav .brand {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
        }

        .top-nav .brand span { color: #cce4ff; }

        .top-nav a.signout {
            color: #cce4ff;
            font-size: .85rem;
            text-decoration: none;
        }

        .top-nav a.signout:hover { color: #fff; }

        .welcome-bar {
            background: #2980d9;
            color: #fff;
            padding: .65rem 1.5rem;
            font-size: .92rem;
        }

        .welcome-bar strong { color: #d6ecff; }

        .section-title {
            font-size: .75rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #5a8ab5;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .content-card {
            background: #fff;
            border-radius: 10px;
            border-top: 4px solid #1a6fc4;
            box-shadow: 0 4px 20px rgba(26,111,196,.12);
            padding: 2rem;
        }

        .label {
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #6d8cab;
            font-weight: 600;
            margin-bottom: .35rem;
        }

        .value {
            font-size: 1.05rem;
            color: #1a3a5c;
            margin-bottom: 1.2rem;
            font-weight: 500;
        }

        .btn-blue {
            background: #1a6fc4;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: .75rem 0;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
            width: 100%;
            transition: background .2s;
        }

        .btn-blue:hover {
            background: #155a9e;
            color: #fff;
        }

        .form-select, .form-control {
            border-radius: 6px;
            padding: .7rem .9rem;
        }

        .divider-title {
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: #5a8ab5;
            font-weight: 600;
            margin: 2rem 0 1rem 0;
            border-top: 1px solid #dbe8f5;
            padding-top: 1.25rem;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a class="brand" href="/">Nittany<span>Auction</span></a>
    <a href="/" class="signout">Sign Out</a>
</div>

<div class="welcome-bar">
    Welcome back, <strong>{{ email }}</strong>
</div>

<div class="container py-4">
    <p class="section-title">Payment</p>

    <div class="content-card">
        <div class="label">Listing</div>
        <div class="value">{{ listing['auction_title'] }}</div>

        <div class="label">Winning Bid</div>
        <div class="value">${{ "%.2f"|format(payment_amount) }}</div>

        <div class="label">Seller</div>
        <div class="value">{{ listing['seller_email'] }}</div>

        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        <form method="POST" class="mt-4">
            <div class="mb-3">
                <label class="label">Select Saved Credit Card</label>
                <select name="credit_card_num" class="form-select">
                    <option value="">-- Select a saved card --</option>
                    {% for card in cards %}
                    <option value="{{ card['credit_card_num'] }}">
                        {{ card['card_type'] }} - {{ card['credit_card_num'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="divider-title">Or Enter a New Card</div>

            <div class="mb-3">
                <label class="label">Credit Card Number</label>
                <input type="text" name="new_credit_card_num" class="form-control" placeholder="1234-5678-9012-3456">
            </div>

            <div class="mb-3">
                <label class="label">Card Type</label>
                <input type="text" name="new_card_type" class="form-control" placeholder="Visa / Mastercard / AmEx">
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="label">Expire Month</label>
                    <input type="number" name="new_expire_month" class="form-control" min="1" max="12" placeholder="MM">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="label">Expire Year</label>
                    <input type="number" name="new_expire_year" class="form-control" min="2024" placeholder="YYYY">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="label">Security Code</label>
                    <input type="number" name="new_security_code" class="form-control" min="0" max="999" placeholder="CVV">
                </div>
            </div>

            <button type="submit" class="btn-blue">Submit Payment</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
