<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<h1> Address settings </h1>
<br>
<p style="display: inline;"> Zipcode: {{ zipcode }} </p>
<form action="/change_zipcode_settings.html" method="GET">
    <button type="submit" name="change_zipcode" value="change_zipcode"> Change Zipcode </button>
</form>
<br>
<p style="display: inline;"> Street Number: {{ street_number }} </p>
<form action="/change_street_number.html" method="GET">
    <button type="submit" name="change_street_number" value="change_street_number"> Change Street Number </button>
</form>
<br>
<p style="display: inline;"> Street Name: {{ street_name }} </p>
<form action="/change_street_name.html" method="GET">
    <button type="submit" name="change_street_name" value="change_street_name"> Change Street Name</button>
</form>
<br>
<form action="{{ previous_webpage }}" method="GET">
    <button type="submit" name="go_back" value="go_back"> Go Back</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
